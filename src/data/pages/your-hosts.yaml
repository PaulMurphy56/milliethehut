metaTitle: "Your Hosts | Millie The Hut"
metaDescription: "Meet the hosts behind Millie The Hut — learn the story of how a shepherd's hut on the England/Wales border became a much-loved countryside retreat."
pageTitle: "Meet Your Hosts"
bioParagraphs:
  - "Paul & Glenys live 100 yards away from Millie, and are normally on hand at any time, day or night, for help and advice."
  - "Paul is an award-winning travel writer and has experienced all levels of accommodations and hospitality around the world, from sipping mint tea by the camp fire outside a primitive straw hut in the Sahara to haute cuisine and Presidential Suites in world capitals. His aim now is to provide an experience that he as a professional would enjoy and recommend. Paul can offer guests detailed advice on many places to visit in the area and his latest publication, Destination HAY, features the nearby world-famous book town."
  - "Glenys has a passion for arts and crafts in the widest sense, reflected in the hut interior with a mix of repurposed, recycled and upcycled furnishings."
ctaHeading: "We'd love to host you"
