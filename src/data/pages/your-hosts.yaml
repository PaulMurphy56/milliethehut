metaTitle: "Your Hosts | Millie The Hut"
metaDescription: "Meet the hosts behind Millie The Hut — learn the story of how a shepherd's hut on the England/Wales border became a much-loved countryside retreat."
pageEyebrow: "Your Hosts"
pageTitle: "Meet Your Hosts"
pageDescription: "Every hut has a story. Ours begins with a love of the countryside, a fondness for slow living, and a shepherd's hut called Millie."
storyHeading: "How Millie came to be"
storyParagraphs:
  - "We'd been dreaming about this for years — a quiet corner of the countryside where people could come to slow down, breathe deeper, and remember what matters. When we found the meadow near Presteigne, tucked between England and Wales on an old railway line, we knew we'd found the right place."
  - "Millie arrived on the back of a trailer in the spring, and we spent the following months fitting her out by hand. Every detail has been considered — from the cast-iron wood burner to the handmade bed, the locally sourced linen to the little touches that make a stay feel personal."
  - "We live nearby and are always on hand to help, but we also believe that the best hospitality is knowing when to step back and let the place speak for itself. The meadow, the brook, the sky — they do a far better job than we ever could."
valuesHeading: "What matters to us"
values:
  - title: "Slow over fast"
    description: "No Wi-Fi by design. No television. Just the wood burner, the birdsong, and the sky. We built Millie for people who want to stop scrolling and start noticing."
  - title: "Small over big"
    description: "Millie sleeps two. That's it. We'd rather do one thing beautifully than try to be everything to everyone. Intimacy is the whole point."
  - title: "Care over convenience"
    description: "We source locally wherever we can — the eggs, the milk, the welcome hamper. We know our neighbours, our farmers, and our suppliers by name."
  - title: "Land over luxury"
    description: "The meadow, the brook, the ancient hills — they're the real amenity. We keep our footprint light and let the landscape do the talking."
ctaHeading: "Come and see for yourself"
ctaDescription: "Book your stay and discover why guests keep coming back to Millie."
