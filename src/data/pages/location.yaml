landscapeParagraphs:
  - The Welsh Marches is the borderland where England blurs into Wales — a
    region of deep valleys, ancient hills, and scattered settlements that has
    remained largely unchanged for centuries. It's the kind of place where you
    might walk all day and see no one, where the light shifts across the hills
    in ways that make you reach for your phone to photograph it, then put it
    away and just watch instead.
  - Presteigne is at the heart of it — a market town that has retained its
    independent character, with a weekly market, independent bookshops,
    galleries, and several excellent pubs. It was once the county town of
    Radnorshire, and a certain quiet pride persists in its streets.
  - Walking directly from the hut, you can join Offa's Dyke Path — the
    long-distance route that traces the ancient earthwork built by King Offa of
    Mercia in the 8th century to mark the boundary between England and Wales. Or
    simply wander the country lanes, through farmland and woodland, following
    your nose.
gettingThereHeading: Finding your way to Millie
attractionsSectionDescription: The Welsh Marches is one of Britain's best-kept
  secrets — rich in history, landscape, and local character.
gettingThereParagraphs:
  - The hut is located near Presteigne on the England/Wales border in Powys.
    It's a beautiful drive from most of the UK, through the rolling hills of the
    Marches.
  - We're about 2.5 hours from London, 1.5 hours from Birmingham, and 1 hour
    from Cardiff. Full directions — including a what3words location — are sent
    with your booking confirmation.
  - We recommend travelling by car. The nearest train stations are at Knighton
    (Cambrian Line) and Leominster (Hereford/Shrewsbury line), both about 10–15
    miles away.
