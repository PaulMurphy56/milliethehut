metaTitle: "The Hut | Millie The Hut"
metaDescription: "Discover Millie The Hut — a beautifully restored shepherd's hut with luxury amenities, double bed, wood-burning stove, and private deck near Presteigne."
pageEyebrow: "The Hut"
pageTitle: "Meet Millie"
pageDescription: "A beautifully restored shepherd's hut built for those who understand that the best things in life are small, slow, and surrounded by countryside."
descriptionHeading: "Built for two. Made for memory."
descriptionParagraphs:
  - "Millie sits quietly on a private plot on the England/Wales border, looking out over the gentle hills of the Welsh Marches. She's a traditional shepherd's hut — iron wheels, corrugated roof, timber clad — but inside she's thoroughly modern and utterly comfortable."
  - "The hut sleeps two in a handmade double bed dressed with crisp white linen. A cast-iron wood-burning stove takes the edge off cool evenings. A small but perfectly formed kitchen means you can self-cater to your heart's content, or simply head into Presteigne for supper at one of the local pubs."
  - "Outside, the private deck is yours alone — a quiet place for morning coffee, afternoon reading, or evening wine beneath a sky unpolluted by light."
