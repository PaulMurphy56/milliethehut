metaTitle: "Millie The Hut | Shepherd's Hut Glamping in the Welsh Marches, Herefordshire"
metaDescription: "Escape to Millie The Hut — a beautifully appointed shepherd's hut nestled in the Welsh Marches near Presteigne. Luxury glamping for two with a wood burner, fire pit & stunning countryside views."
heroOverlayText: "Escape to the\nWelsh Marches"
introHeading: "Millie The Hut, Presteigne, Herefordshire."
introParagraph: "Down a leafy lane, where steam trains once ran, across a Victorian railway bridge that takes you from Wales to England, you'll find a meadow where sheep graze, and a traditional-style Shepherds Hut and Shack. On sunny days, the meadow is bathed in light from dawn to dusk, and the gin-clear Hindwell Brook that bounds it flashes silver. Whatever the weather, after dark is a special time to be here, when the log burner in the hut, the firepit by the stream and the lamps and candles in the Shack cast a magical golden glow."
